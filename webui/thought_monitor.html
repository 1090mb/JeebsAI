<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>JeebsAI Cognitive Stream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/webui/style.css" />
    <style>
        .thought-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .monologue-card {
            margin-top: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .monologue-content {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text);
            padding: 20px;
            background: var(--bg-0);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .meta-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .sentiment-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .pos {
            color: var(--good);
        }

        .neg {
            color: var(--bad);
        }

        .refresh-notice {
            text-align: right;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div id="app-layout">
        <aside id="sidebar-container" data-active="thoughts"></aside>
        <main class="main-content">
            <div class="shell" style="max-width:1000px">
                <div class="header" style="margin-bottom: 32px;">
                    <h1>🧠 Cognitive Stream</h1>
                    <p class="text-secondary">Real-time monitoring of JeebsAI's internal monologue and cognitive state.
                    </p>
                </div>

                <div class="thought-container">
                    <div class="card monologue-card">
                        <div class="card-header">
                            <h3>Internal Monologue</h3>
                            <span class="badge badge-info">Live</span>
                        </div>
                        <div id="monologue" class="monologue-content">Waiting for input...</div>
                    </div>

                    <div class="meta-stats">
                        <div class="card">
                            <h3>Sentiment Valence</h3>
                            <div id="sentiment" class="sentiment-value">0.00</div>
                        </div>
                        <div class="card">
                            <h3>Cognitive Angle</h3>
                            <div id="angle" class="sentiment-value" style="font-size: 1.2rem; color: var(--accent);">
                                -
                            </div>
                        </div>
                        <div class="card">
                            <h3>Curiosity Target</h3>
                            <div id="curiosity" class="sentiment-value"
                                style="font-size: 1.2rem; color: var(--warning);">
                                -
                            </div>
                        </div>
                        <div class="card">
                            <h3>Active Listening Cue</h3>
                            <div id="listening-cue" class="sentiment-value" style="font-size: 1.1rem; color: var(--info);">
                                -
                            </div>
                        </div>
                    </div>

                    <div class="refresh-notice">
                        Auto-refreshing every 1s • Session: <span id="session-id">...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/webui/auth.js"></script>
    <script src="/webui/nav.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user') || 'session:default';
        document.getElementById('session-id').textContent = userId;

        async function fetchThought() {
            try {
                const response = await safeFetch(`/api/brain/thought/${encodeURIComponent(userId)}`, {
                    headers: authHeaders()
                });
                const data = await response.json();

                if (data.success && data.thought) {
                    const t = data.thought;
                    document.getElementById('monologue').textContent = t.internal_monologue;

                    const sentEl = document.getElementById('sentiment');
                    sentEl.textContent = t.detected_sentiment.toFixed(2);
                    sentEl.className = 'sentiment-value ' + (t.detected_sentiment > 0.2 ? 'pos' : (t.detected_sentiment < -0.2 ? 'neg' : ''));

                    document.getElementById('angle').textContent = t.suggested_angle || '-';
                    document.getElementById('curiosity').textContent = t.curiosity_target || "None";

                    // Show a user-friendly active listening cue based on the angle
                    let cue = '-';
                    switch ((t.suggested_angle || '').toLowerCase()) {
                        case 'empathetic':
                            cue = "I'm here for you and understand how you feel.";
                            break;
                        case 'clarifying':
                            cue = "Let me make sure I understand. Could you clarify or share more?";
                            break;
                        case 'curious':
                            cue = "That's interesting! Tell me more if you'd like.";
                            break;
                        case 'collaborative':
                            cue = "Thank you for your input. Let's work together!";
                            break;
                        case 'friendly':
                            cue = "Hi! I'm glad to chat with you.";
                            break;
                        default:
                            cue = '-';
                    }
                    document.getElementById('listening-cue').textContent = cue;
                }
            } catch (e) {
                console.error("Failed to fetch thought:", e);
            }
        }

        JeebsNav.init('thoughts');
        setInterval(fetchThought, 1000);
        fetchThought();
    </script>
</body>

</html>
