<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>JeebsAI Code Generation</title>
  <link rel="stylesheet" href="/webui/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <style>
    .codegen-container { max-width: 700px; margin: 40px auto; }
    .codegen-card { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; }
    .codegen-result { background: #181c24; color: #e0e6f0; font-family: var(--font-mono); padding: 16px; border-radius: 8px; margin-top: 16px; white-space: pre; overflow-x: auto; position: relative; }
    .codegen-label { font-weight: 600; margin-bottom: 6px; display: block; }
    .copy-btn { position: absolute; top: 8px; right: 12px; background: var(--bg-2); color: var(--accent); border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.9em; cursor: pointer; }
  </style>
</head>
<body>
  <div class="codegen-container">
    <div class="codegen-card">
      <h2>JeebsAI Code Generation <span style="font-size:0.7em;color:var(--muted)">(Admin Only)</span></h2>
      <div id="authStatus" class="text-muted" style="margin-bottom:12px">Checking access...</div>
      <div id="codegen-ui" style="display:none">
        <label class="codegen-label" for="language">Programming Language</label>
        <select id="language" class="form-input" style="width:100%"></select>
        <label class="codegen-label" for="prompt">Describe what you want the code to do</label>
        <textarea id="prompt" class="form-input" rows="4" style="width:100%" placeholder="e.g. Make a REST API server"></textarea>
        <button id="generateBtn" class="btn btn-accent" style="margin-top:12px">Generate Code</button>
        <div id="result" class="codegen-result" style="display:none; position:relative">
          <button id="copyBtn" class="copy-btn" style="display:none">Copy</button>
          <pre><code id="codeBlock"></code></pre>
        </div>
        <div id="historySection" style="margin-top:32px;">
          <h3 style="margin-bottom:8px; font-size:1.1em;">Recent Code Generation History</h3>
          <div id="historyList" style="max-height:220px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; background:var(--bg-2); padding:10px 8px;"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/webui/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    (async function() {
      var auth = await requireAuth();
      if (!auth || !auth.loggedIn || !auth.is_admin) {
        document.getElementById("authStatus").innerHTML = '<span class="text-danger">Access denied. Admins only.</span>';
        return;
      }
      document.getElementById("authStatus").innerHTML = '<span class="text-success">Access granted for ' + escapeHtml(auth.username) + ' (admin)</span>';
      document.getElementById("codegen-ui").style.display = "block";
      // Fetch available languages
      const res = await fetch("/api/code/capabilities", { credentials: "same-origin", headers: authHeaders() });
      const data = await res.json();
      const langSel = document.getElementById("language");
      (data.languages || []).forEach(lang => {
        const opt = document.createElement("option");
        opt.value = lang; opt.textContent = lang.charAt(0).toUpperCase() + lang.slice(1);
        langSel.appendChild(opt);
      });
      document.getElementById("generateBtn").onclick = async function() {
        const language = langSel.value;
        const prompt = document.getElementById("prompt").value;
        if (!language || !prompt) return;
        this.disabled = true;
        const resultDiv = document.getElementById("result");
        resultDiv.style.display = "none";
        document.getElementById("codeBlock").textContent = "";
        document.getElementById("copyBtn").style.display = "none";
        try {
          const res = await fetch("/api/code/generate", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ language, prompt })
          });
          const data = await res.json();
          if (data.success) {
            const code = data.code || "";
            const lang = (language || "").toLowerCase();
            const codeBlock = document.getElementById("codeBlock");
            codeBlock.textContent = code;
            codeBlock.className = lang;
            resultDiv.style.display = "block";
            document.getElementById("copyBtn").style.display = "inline-block";
            setTimeout(() => { try { hljs.highlightElement(codeBlock); } catch(e){} }, 10);
          } else {
            document.getElementById("codeBlock").textContent = data.error || "Failed to generate code.";
            resultDiv.style.display = "block";
          }
              document.getElementById("copyBtn").onclick = function() {
                const code = document.getElementById("codeBlock").textContent;
                navigator.clipboard.writeText(code).then(() => {
                  this.textContent = "Copied!";
                  setTimeout(() => { this.textContent = "Copy"; }, 1200);
                });
              };
        } catch (e) {
          resultDiv.textContent = "Error: " + e;
          resultDiv.style.display = "block";
        } finally {
          this.disabled = false;
        }
      };
      // --- Codegen History ---
      async function loadHistory() {
        const res = await fetch("/api/code/history?username=" + encodeURIComponent(auth.username), { credentials: "same-origin", headers: authHeaders() });
        const data = await res.json();
        const list = document.getElementById("historyList");
        list.innerHTML = "";
        if (!data.success || !data.history || !data.history.length) {
          list.innerHTML = '<div class="text-muted">No codegen history yet.</div>';
          return;
        }
        data.history.forEach((item, idx) => {
          const div = document.createElement("div");
          div.className = "history-item";
          div.style = "padding:7px 0; border-bottom:1px solid var(--border); cursor:pointer;";
          div.innerHTML = `<b>${escapeHtml(item.language||'')}</b> &mdash; <span style='color:var(--muted);'>${escapeHtml(item.prompt||'')}</span><br><span style='font-size:0.85em;color:var(--muted);'>${escapeHtml(item.timestamp||'')}</span>`;
          div.onclick = function() {
            document.getElementById("language").value = item.language;
            document.getElementById("prompt").value = item.prompt;
            document.getElementById("codeBlock").textContent = item.code;
            document.getElementById("result").style.display = "block";
            document.getElementById("copyBtn").style.display = "inline-block";
            setTimeout(() => { try { hljs.highlightElement(document.getElementById("codeBlock")); } catch(e){} }, 10);
          };
          list.appendChild(div);
        });
      }
      await loadHistory();
      // Reload history after each generation
      document.getElementById("generateBtn").addEventListener("click", function() {
        setTimeout(loadHistory, 500);
      });
    })();
  </script>
</body>
</html>
