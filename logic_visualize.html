<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Logic Graph — JeebsAI</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/webui/style.css" />
  <style>
    #mynetwork {
      width: 100%;
      height: 700px;
      background: var(--bg-0);
      border-radius: var(--radius-lg);
    }

    #loading {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      padding: 14px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      color: var(--accent);
      z-index: 10;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #loading .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div id="app-layout">
    <aside id="sidebar-container" data-active="logic"></aside>
    <main class="main-content">
      <div class="shell" style="max-width:1200px">
        <div class="header" style="margin-bottom: 32px;">
          <h1>🔗 Logic Graph</h1>
          <p class="text-secondary">Interactive visualization of JeebsAI's internal reasoning chains and
            logical connections.</p>
        </div>

        <div class="card" style="padding: 0; position:relative; overflow: hidden; height: 700px;">
          <div id="loading">
            <div class="spinner"></div> Loading Logic Graph&hellip;
          </div>
          <div id="mynetwork"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/webui/auth.js"></script>
  <script src="/webui/nav.js"></script>
  <script>
    async function loadGraph() {
      try {
        var res = await safeFetch("/api/brain/logic_graph", {
          headers: authHeaders()
        });
        if (!res.ok) {
          var body = await res.text();
          throw new Error("HTTP " + res.status + (body ? ": " + body : ""));
        }
        var data = await res.json();
        var container = document.getElementById("mynetwork");
        var nodes = new vis.DataSet(Array.isArray(data.nodes) ? data.nodes : []);
        var edges = new vis.DataSet(Array.isArray(data.edges) ? data.edges : []);
        var options = {
          nodes: {
            font: {
              size: 14,
              color: "#EDEDED"
            },
            borderWidth: 1,
            color: {
              background: "#121212",
              border: "#3B82F6",
              highlight: {
                background: "#1E293B",
                border: "#60A5FA"
              }
            },
            shape: 'dot',
            size: 20
          },
          edges: {
            width: 1,
            color: {
              color: "rgba(255,255,255,0.1)",
              highlight: "#3B82F6"
            },
            smooth: {
              type: "continuous"
            },
            arrows: {
              to: {
                enabled: true,
                scaleFactor: 0.5
              }
            }
          },
          physics: {
            stabilization: false,
            barnesHut: {
              gravitationalConstant: -2000,
              springConstant: 0.04,
              springLength: 150
            }
          },
          interaction: {
            hover: true
          }
        };
        new vis.Network(container, {
          nodes: nodes,
          edges: edges
        }, options);
        document.getElementById("loading").style.display = "none";
      } catch (e) {
        var l = document.getElementById("loading");
        l.innerHTML = "Error loading graph: " + e;
        l.style.color = "#ef4444";
      }
    }

    JeebsNav.init('logic');
    loadGraph();
  </script>
</body>

</html>
