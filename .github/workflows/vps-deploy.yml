name: Deploy to VPS

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libsqlite3-dev clang llvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-

      - name: Build release binary
        run: cargo build --release

      - name: Create VERSION file from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Prefer the release tag from the event. Fallback to GITHUB_REF suffix if missing (e.g., when manually dispatched).
          if [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "$TAG" > VERSION
          echo "Created VERSION: $(cat VERSION)"
          ls -lh target/release/jeebs VERSION || true

      - name: Add SSH key to agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload binary and VERSION to VPS via scp
        env:
          TARGET: ${{ secrets.VPS_TARGET }}
        run: |
          if [ -z "$TARGET" ]; then TARGET="/root/JeebsAI"; fi
          mkdir -p target/release
          echo "Uploading binary and VERSION to ${TARGET} on ${VPS_HOST}..."
          scp -o StrictHostKeyChecking=yes -P "${{ secrets.VPS_PORT }}" target/release/jeebs "${{ secrets.VPS_USER }}"@"${{ secrets.VPS_HOST }}":"$TARGET/target/release/jeebs"
          scp -o StrictHostKeyChecking=yes -P "${{ secrets.VPS_PORT }}" VERSION "${{ secrets.VPS_USER }}"@"${{ secrets.VPS_HOST }}":"$TARGET/VERSION"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e
            echo "🚀 Starting deployment on VPS..."

            TARGET="${{ secrets.VPS_TARGET }}"
            if [ -z "$TARGET" ]; then TARGET="/root/JeebsAI"; fi
            mkdir -p "$TARGET"
            cd "$TARGET"

            # Ensure cargo/rust are available
            export PATH="$HOME/.cargo/bin:/usr/local/bin:$PATH"

            # Install build deps on VPS if missing
            if ! command -v pkg-config &>/dev/null; then
              echo "Installing build dependencies on VPS..."
              apt-get update -qq
              apt-get install -y -qq build-essential pkg-config libssl-dev libsqlite3-dev \
                clang llvm curl git
            fi

            # Install Rust if missing
            if ! command -v cargo &>/dev/null; then
              echo "Installing Rust on VPS..."
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              export PATH="$HOME/.cargo/bin:$PATH"
            fi

            # Clone or update repo
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }} .
            else
              echo "Updating repository..."
              git fetch origin
              git reset --hard origin/main
            fi

            # Use uploaded binary (copied from runner). Make sure it's executable.
            if [ ! -f "$TARGET/target/release/jeebs" ]; then
              echo "Uploaded binary not found at $TARGET/target/release/jeebs"
              ls -la "$TARGET" || true
              exit 1
            fi
            chmod +x "$TARGET/target/release/jeebs"

            # Ensure DB exists
            [ -f "$TARGET/jeebs.db" ] || touch "$TARGET/jeebs.db"

            # Create/update systemd service
            cat > /etc/systemd/system/jeebs.service <<UNIT
          [Unit]
          Description=JeebsAI Server
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=$TARGET
          Environment=PORT=8080
          Environment=DATABASE_URL=sqlite:$TARGET/jeebs.db
          Environment=RUST_LOG=info
          ExecStart=$TARGET/target/release/jeebs
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT

            systemctl daemon-reload
            systemctl enable jeebs
            systemctl restart jeebs
            sleep 3

            if systemctl is-active --quiet jeebs; then
              echo "✅ JeebsAI is running!"
              curl -sf -o /dev/null -w "   Health: HTTP %{http_code}\n" http://127.0.0.1:8080/api/health || true
            else
              echo "❌ Service failed to start"
              journalctl -u jeebs --no-pager -n 20
              exit 1
            fi

      - name: Report status
        if: failure()
        run: echo "❌ Build or deploy failed. Check logs above."
