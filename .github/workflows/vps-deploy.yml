name: Release Deploy to VPS

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy (release semantics)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Ensure Rust stable
        run: |
          rustup default stable || true

      - name: Build release
        run: |
          cargo build --release

      - name: Bump semantic VERSION (patch) and commit to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo_dir=/tmp/jeebs-repo
          rm -rf "$repo_dir"

          # Clone a fresh copy of main using the token so we don't touch the runner workspace
          git clone --depth 1 --branch main "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$repo_dir"
          cd "$repo_dir"

          # Read current version or default
          if [ -f VERSION ]; then
            cur=$(cat VERSION)
          else
            cur="v0.0.0"
          fi

          if [[ "$cur" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            patch=$((patch+1))
            new_version="v${major}.${minor}.${patch}"
          else
            new_version="v0.0.1"
          fi

          echo "$new_version" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $new_version [ci skip]" || echo "No changes to commit"

          # Push using the GITHUB_TOKEN
          git push origin main
          echo "Bumped VERSION -> $new_version"

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure VPS host is known
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.227.193.148 >> ~/.ssh/known_hosts || true

      - name: Copy files to VPS (v0.0.1 behavior)
        run: |
          # Use ssh-agent (key was added earlier) instead of a hard-coded identity file
          scp -o StrictHostKeyChecking=yes target/release/jeebs root@192.227.193.148:/root/JeebsAI/target/release/jeebs
          scp -o StrictHostKeyChecking=yes -r webui/ root@192.227.193.148:/root/JeebsAI/webui/
          scp -o StrictHostKeyChecking=yes VERSION root@192.227.193.148:/root/JeebsAI/VERSION
          ssh -o StrictHostKeyChecking=yes root@192.227.193.148 'chmod +x /root/JeebsAI/target/release/jeebs && systemctl daemon-reload && systemctl restart jeebs && systemctl status --no-pager --full jeebs'

