<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeebsAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/webui/style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="header-brand">
                <svg class="jeebs-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
                    <circle cx="16" cy="16" r="6" fill="currentColor" opacity="0.6"/>
                    <path d="M16 2v8M16 22v8M2 16h8M22 16h8" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
                </svg>
                <h1>JeebsAI</h1>
            </div>
            <div class="header-topic" id="headerTopic">Ready to chat</div>
            <div class="header-actions">
                <div class="brain-status" id="brainStatus">
                    <span class="status-indicator">●</span>
                    <span class="status-text">Awake</span>
                </div>
                <div class="account-menu">
                    <button class="btn-account" id="accountBtn">Account</button>
                    <div class="account-dropdown" id="accountDropdown" style="display:none;">
                        <button id="logoutBtn">Logout</button>
                        <button id="settingsBtn">Settings</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
        <!-- Auth Views -->
        <div id="authViews" class="auth-container" style="display:none;">
            <div id="loginView" class="auth-view active">
                <div class="auth-box">
                    <h2>Sign In</h2>
                    <form id="loginForm">
                        <input type="text" id="username" placeholder="Username" required>
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Chat Layout -->
        <div class="chat-layout">
            <!-- Chat Area (75%) -->
            <div class="chat-area">
                <div id="messages" class="messages-container"></div>
                <div class="chat-input-section">
                    <textarea id="userInput" class="chat-input" placeholder="Ask me anything..." rows="2"></textarea>
                    <button id="sendBtn" class="btn-send">Send</button>
                </div>
            </div>

            <!-- Sidebar (25%) -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Conversation</h3>
                    <div id="topicInfo" class="info-item">
                        <label>Topic:</label>
                        <span id="currentTopic">General</span>
                    </div>
                    <div class="info-item">
                        <label>Messages:</label>
                        <span id="messageCount">0</span>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>History</h3>
                    <div id="historyList" class="history-list"></div>
                </div>

                <div class="sidebar-section">
                    <h3>Learning</h3>
                    <div id="learningStatus" class="info-item">
                        <label>Mode:</label>
                        <span id="learningMode">Disabled</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-left" id="statusLeft">Ready</div>
        <div class="status-center" id="statusCenter"></div>
        <div class="status-right" id="statusRight">v0.0.7</div>
    </footer>

    <!-- Scripts -->
    <script src="/webui/js/api.js"></script>
    <script src="/webui/js/auth.js"></script>
    <script src="/webui/js/chat.js"></script>
    <script src="/webui/js/ui.js"></script>
</body>
</html>
