name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
    - name: Notify Discord Start
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "Production Deployment Started"
        color: 0xFFD700 # Gold/Yellow

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Clean macOS metadata files
      run: find . -type f -name '._*' -print -delete

    - name: Build JeebsAI (Release)
      run: cargo build --release

    - name: Create Deployment Bundle
      run: |
        # Create a tarball containing the binary, migrations, webui, and scripts
        tar -czf deploy_package.tar.gz target/release/jeebs migrations webui scripts

    - name: Upload to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 192.227.193.148
        username: ${{ secrets.STAGING_SSH_USERNAME }}
        key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        source: "deploy_package.tar.gz"
        target: "/root/JeebsAI"
        timeout: 5m

    - name: Install and Restart
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 192.227.193.148
        username: ${{ secrets.STAGING_SSH_USERNAME }}
        key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        timeout: 15m
        script: |
          cd /root/JeebsAI
          
          echo "📦 Extracting deployment package..."
          tar -xzf deploy_package.tar.gz
          rm deploy_package.tar.gz
          
          echo "🛑 Stopping service..."
          systemctl stop jeebs || true
          
          echo "💾 Backing up database..."
          mkdir -p /var/backups/jeebs
          cp /var/lib/jeebs/jeebs.db /var/backups/jeebs/jeebs_$(date +%Y%m%d_%H%M%S).db || true
          
          echo "🔄 Running migrations..."
          if [ -d "migrations" ]; then
            for f in migrations/*.sql; do
              sqlite3 /var/lib/jeebs/jeebs.db < "$f" || true
            done
          fi
          
          echo "🚀 Starting service..."
          systemctl start jeebs
          
          echo "✅ Verifying status..."
          sleep 5
          systemctl status jeebs --no-pager
          
          echo "🌐 Checking Nginx..."
          systemctl reload nginx || systemctl start nginx

    - name: Notify Discord Success
      uses: sarisia/actions-status-discord@v1
      if: success()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: success
        title: "Production Deployment Succeeded 🚀"

    - name: Notify Discord Failure
      uses: sarisia/actions-status-discord@v1
      if: failure()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: failure
        title: "Production Deployment Failed ❌"