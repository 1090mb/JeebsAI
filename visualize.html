<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Brain Visualization — JeebsAI</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/webui/style.css" />
  <style>
    #mynetwork {
      width: 100%;
      height: 700px;
      background: var(--bg-0);
      border-radius: var(--radius-lg);
    }

    #loading {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      padding: 14px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      color: var(--accent);
      z-index: 10;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #loading .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div id="app-layout">
    <aside id="sidebar-container"></aside>
    <main class="main-content">
      <div class="shell" style="max-width:1200px">
        <div class="card card-glow" style="margin-bottom:24px;text-align:center">
          <h1 style="margin-bottom:8px">Brain Visualization</h1>
          <p class="text-muted">Interactive graph of the JeebsAI knowledge network. <span class="badge badge-accent"
              style="font-size:0.7em;vertical-align:middle;margin-left:6px">LIVE</span></p>
          <div style="margin-top:12px;display:flex;justify-content:center;gap:10px;align-items:center">
            <label class="text-muted" style="font-size:0.9em">Filter by Category:</label>
            <select id="categoryFilter" class="form-input" style="width:auto;padding:4px 8px;font-size:0.9em"
              onchange="if(network) network.redraw()">
              <option value="all">All Categories</option>
            </select>
          </div>
        </div>
        <div class="card" style="padding: 0; position:relative; overflow: hidden; height: 700px;">
          <div id="loading">
            <div class="spinner"></div> Loading Brain Graph&hellip;
          </div>
          <div id="mynetwork"></div>
        </div>
      </div>

      <script src="/webui/auth.js"></script>
      <script src="/webui/nav.js"></script>
      <script>
        var network, nodesDataSet, edgesDataSet, nodesView;

        async function initPage() {
          try {
            // 1. Ensure authentication and populate session data
            await requireAuth();
            
            // 2. Initialize Navigation
            JeebsNav.init('brain');
            
            // 3. Load Graph
            await loadGraph();
          } catch (e) {
            console.error("Initialization failed:", e);
            document.getElementById("loading").innerHTML = "Access Denied or Session Expired. <a href='/webui/index.html#login' style='color:#3B82F6'>Login</a>";
          }
        }

        async function loadGraph() {
          try {
            document.getElementById("loading").style.display = "flex";
            var res = await safeFetch("/api/brain/visualize", { credentials: 'same-origin', headers: authHeaders() });
            if (!res.ok) { 
              var body = await res.text(); 
              throw new Error("HTTP " + res.status + (body ? ": " + body : "")); 
            }
            
            var data = await res.json();
            var container = document.getElementById("mynetwork");
            
            nodesDataSet = new vis.DataSet(Array.isArray(data.nodes) ? data.nodes : []);
            edgesDataSet = new vis.DataSet(Array.isArray(data.edges) ? data.edges : []);

            // Populate categories for filtering
            var categories = new Set();
            nodesDataSet.forEach(n => categories.add(n.group || 'General'));
            var sel = document.getElementById('categoryFilter');
            if (sel) {
              var current = sel.value;
              sel.innerHTML = '<option value="all">All Categories</option>';
              Array.from(categories).sort().forEach(c => {
                var opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
              });
              sel.value = current;
            }

            nodesView = new vis.DataView(nodesDataSet, {
              filter: function (item) {
                var val = document.getElementById('categoryFilter') ? document.getElementById('categoryFilter').value : 'all';
                return val === 'all' || (item.group || 'General') == val;
              }
            });

            var options = {
              nodes: { 
                shape: "dot", 
                scaling: { min: 10, max: 40, label: { enabled: true } },
                font: { size: 14, color: "#EDEDED", strokeWidth: 4, strokeColor: "rgba(0,0,0,0.5)" },
                borderWidth: 2,
                color: { 
                  background: "#121212", 
                  border: "rgba(59, 130, 246, 0.5)",
                  highlight: { background: "#1E293B", border: "#3B82F6" },
                  hover: { background: "#1E293B", border: "#3B82F6" }
                },
                shadow: { enabled: true, color: "rgba(0,0,0,0.5)", size: 10 }
              },
              edges: { 
                width: 1, 
                color: { color: "rgba(161, 161, 170, 0.2)", highlight: "#3B82F6", hover: "#3B82F6" }, 
                smooth: { type: "continuous" },
                arrows: { to: { enabled: true, scaleFactor: 0.5 } }
              },
              groups: {
                Technology: { color: { background: "#1E293B", border: "#3B82F6" } },
                Science: { color: { background: "#064E3B", border: "#10B981" } },
                Business: { color: { background: "#451A03", border: "#F59E0B" } },
                History: { color: { background: "#4C1D95", border: "#8B5CF6" } },
                Culture: { color: { background: "#701A75", border: "#D946EF" } }
              },
              physics: { 
                stabilization: { iterations: 150 },
                barnesHut: { gravitationalConstant: -10000, springConstant: 0.04, springLength: 120 } 
              },
              interaction: { hover: true, tooltipDelay: 200, navigationButtons: true, keyboard: true }
            };
            
            network = new vis.Network(container, { nodes: nodesView, edges: edgesDataSet }, options);
            document.getElementById("loading").style.display = "none";

            // Click to see details
            network.on("selectNode", function (params) {
              var nodeId = params.nodes[0];
              var node = nodesDataSet.get(nodeId);
              if (node) console.log("Selected node:", node);
            });

            // Auto-refresh every 15 seconds
            setInterval(async function () {
              try {
                var r = await safeFetch("/api/brain/visualize", { credentials: 'same-origin', headers: authHeaders() });
                if (r.ok) {
                  var d = await r.json();
                  if (nodesDataSet) nodesDataSet.update(d.nodes || []);
                  if (edgesDataSet) edgesDataSet.update(d.edges || []);
                }
              } catch (e) { }
            }, 15000);
          } catch (e) {
            var l = document.getElementById("loading"); 
            l.innerHTML = "Error loading graph: " + e; 
            l.style.color = "#EF4444";
          }
        }
        
        // Start initialization
        initPage();
      </script>
    </main>
  </div>
</body>

</html>
